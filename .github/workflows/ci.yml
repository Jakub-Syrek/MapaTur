name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Run JS-based actions on Node 24: GitHub removes the Node 20 runtime (forced from
  # 2026-06-16). The official opt-in covers setup-dotnet / upload-artifact without guessing
  # major versions that may not exist yet.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and test (core libraries)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore core libraries
        run: |
          dotnet restore src/MapaTur.Domain/MapaTur.Domain.csproj
          dotnet restore src/MapaTur.Application/MapaTur.Application.csproj
          dotnet restore src/MapaTur.Infrastructure/MapaTur.Infrastructure.csproj
          dotnet restore src/MapaTur.Routing/MapaTur.Routing.csproj
          dotnet restore tests/MapaTur.Domain.Tests/MapaTur.Domain.Tests.csproj
          dotnet restore tests/MapaTur.Application.Tests/MapaTur.Application.Tests.csproj
          dotnet restore tests/MapaTur.Infrastructure.Tests/MapaTur.Infrastructure.Tests.csproj
          dotnet restore tests/MapaTur.Routing.Tests/MapaTur.Routing.Tests.csproj
          dotnet restore tests/MapaTur.Integration.Tests/MapaTur.Integration.Tests.csproj

      - name: Build core libraries
        run: |
          dotnet build src/MapaTur.Domain/MapaTur.Domain.csproj --no-restore -c Release
          dotnet build src/MapaTur.Application/MapaTur.Application.csproj --no-restore -c Release
          dotnet build src/MapaTur.Infrastructure/MapaTur.Infrastructure.csproj --no-restore -c Release
          dotnet build src/MapaTur.Routing/MapaTur.Routing.csproj --no-restore -c Release

      - name: Run tests
        run: |
          dotnet test tests/MapaTur.Domain.Tests/MapaTur.Domain.Tests.csproj --no-restore -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test tests/MapaTur.Application.Tests/MapaTur.Application.Tests.csproj --no-restore -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test tests/MapaTur.Infrastructure.Tests/MapaTur.Infrastructure.Tests.csproj --no-restore -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test tests/MapaTur.Routing.Tests/MapaTur.Routing.Tests.csproj --no-restore -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage
          dotnet test tests/MapaTur.Integration.Tests/MapaTur.Integration.Tests.csproj --no-restore -c Release --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: ./coverage

  format-check:
    name: Format check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Verify formatting
        run: |
          dotnet format src/MapaTur.Domain/MapaTur.Domain.csproj --verify-no-changes --severity warn
          dotnet format src/MapaTur.Application/MapaTur.Application.csproj --verify-no-changes --severity warn
          dotnet format src/MapaTur.Infrastructure/MapaTur.Infrastructure.csproj --verify-no-changes --severity warn
          dotnet format src/MapaTur.Routing/MapaTur.Routing.csproj --verify-no-changes --severity warn

  maui-build:
    name: MAUI build (Windows)
    runs-on: windows-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workloads
        # On Windows the App's <TargetFrameworks> resolves to Android + Windows
        # (iOS / MacCatalyst are gated on macOS in the csproj). Both workloads
        # are needed at restore time even though the build only targets Windows.
        run: dotnet workload install maui-windows maui-android

      - name: Publish MAUI app (Windows TFM only)
        # `dotnet publish` is what you want when you need to scope a RID to a
        # *specific* TFM: restore + build + apphost wiring all happen against
        # net10.0-windows10.0.19041.0, so the Android TFM is never asked for
        # a Mono-win-x64 runtime pack (NU1102). UseAppHost=false skips the
        # native .exe stamping CI doesn't need, which avoids NETSDK1112's
        # demand for the win-x64 runtime pack on the build leg.
        run: dotnet publish src/MapaTur.App/MapaTur.App.csproj -c Release -f net10.0-windows10.0.19041.0 -p:UseAppHost=false -p:WindowsPackageType=None
